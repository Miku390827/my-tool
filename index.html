<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Tool</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #222;
    }

    header .logo {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    nav a {
      color: #aaa;
      text-decoration: none;
      margin-left: 2rem;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    nav a:hover { color: #fff; }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem;
    }

    .badge {
      display: inline-block;
      background: #1a1a2e;
      border: 1px solid #333;
      color: #7c7cff;
      font-size: 0.8rem;
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      margin-bottom: 2rem;
      letter-spacing: 0.05em;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #fff 40%, #888);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 1.15rem;
      color: #888;
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 3rem;
    }

    .cta-group {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
      cursor: pointer;
      border: none;
    }

    .btn:hover { opacity: 0.85; transform: translateY(-1px); }

    .btn-primary {
      background: #7c7cff;
      color: #fff;
    }

    .btn-secondary {
      background: transparent;
      color: #ccc;
      border: 1px solid #333;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      padding: 4rem 2rem;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    .card {
      background: #161616;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 1.75rem;
    }

    .card-icon {
      font-size: 1.75rem;
      margin-bottom: 1rem;
    }

    .card h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .card p {
      font-size: 0.875rem;
      color: #777;
      line-height: 1.6;
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: #444;
      font-size: 0.8rem;
      border-top: 1px solid #1a1a1a;
    }
  </style>
</head>
<body>

  <header>
    <span class="logo">My Tool</span>
    <nav>
      <a href="#">機能</a>
      <a href="#">ドキュメント</a>
      <a href="#">GitHub</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <span class="badge">v1.0 リリース</span>
      <h1>あなたの作業を<br>もっとスマートに</h1>
      <p class="subtitle">My Tool は、日々の作業を効率化するためのシンプルで強力なツールです。</p>
      <div class="cta-group">
        <a href="#" class="btn btn-primary">今すぐ始める</a>
        <a href="#" class="btn btn-secondary">詳しく見る</a>
      </div>
    </section>

    <section class="features">
      <div class="card">
        <div class="card-icon">⚡</div>
        <h3>高速</h3>
        <p>軽量設計で、どんな環境でもサクサク動作します。</p>
      </div>
      <div class="card">
        <div class="card-icon">🔒</div>
        <h3>安全</h3>
        <p>データはローカルで処理。プライバシーを最優先に設計されています。</p>
      </div>
      <div class="card">
        <div class="card-icon">🛠️</div>
        <h3>カスタマイズ</h3>
        <p>柔軟な設定で、あなたのワークフローに合わせて最適化できます。</p>
      </div>
    </section>
  </main>

  <footer>
    &copy; 2026 My Tool. All rights reserved.
  </footer>

</body>
</html>
